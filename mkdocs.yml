site_name: "Leitbild Wiki"
site_description: "LLM-readable operational knowledge base, tutorial, and specification hub for Leitbild"
site_url: "https://samsinn-wikis.github.io/leitbild/"
docs_dir: wiki
repo_url: "https://github.com/samsinn-wikis/leitbild"
repo_name: "samsinn-wikis/leitbild"
edit_uri: edit/main/wiki/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - roamlinks

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list
  - footnotes
  - md_in_html

extra:
  wiki_version: "0.1.0"
  feedback_issue_url: "https://github.com/samsinn-wikis/leitbild/issues/new"

nav:
  - Home: index.md
  - Start here: start-here.md
  - Tutorials: tutorials.md
  - Scenarios:
    - Overview: scenarios.md
    - Oslo Ambulance: scenarios/oslo-ambulance.md
    - Halden: scenarios/halden.md
  - Concepts: concepts.md
  - Domains:
    - Ambulance: domains/ambulance.md
    - Traffic: domains/traffic.md
    - Weather: domains/weather.md
    - Process Plant: domains/process-plant.md
  - Agent guides: agent-guides.md
  - Specs: specs.md
  - ADRs:
    - TypeScript, Bun, Single Server: adrs/0001-typescript-bun-single-server.md
    - Core Domain Object Model: adrs/0002-core-domain-object-model.md
    - Simulation Adapter Boundary: adrs/0003-simulation-adapter-boundary.md
    - Map Rendering Strategy: adrs/0004-map-rendering-strategy.md
    - No Mock Production Functionality: adrs/0005-no-mock-or-dummy-production-functionality.md
    - Static Pack Architecture: adrs/0006-static-leitbild-pack-architecture.md
    - Object Context And Mission Model: adrs/0007-object-context-scenario-mission-model.md
    - Interaction Signals And Handlers: adrs/0008-interaction-signals-and-handlers.md
    - Composite Providers And Traffic: adrs/0009-composite-simulation-providers-and-traffic.md
    - Control Instance Memory: adrs/0010-control-instance-memory-and-persistence.md
    - Vector Tile Base Map: adrs/0011-self-hosted-vector-tile-base-map.md
    - Svelte 5 UI Architecture: adrs/0012-svelte-5-ui-architecture.md
    - Scenario Script Runtime: adrs/0013-scenario-script-runtime.md
    - Scenario Surface Definitions: adrs/0014-scenario-surface-definitions.md
    - H3 Spatial Field Index: adrs/0015-h3-spatial-field-index.md
    - Generic Pack Query Surface: adrs/0016-generic-pack-query-surface.md
    - Process Plant Component Graph: adrs/0017-process-plant-component-graph.md
  - Source map: source-map.md
  - Simulation technologies: simulation-technologies.md
  - Future projects: future-projects.md
